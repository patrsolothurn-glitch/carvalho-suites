name: Supabase Keep-Alive

on:
  schedule:
    # Corre de 5 em 5 dias, às 06:00 UTC
    - cron: '0 6 */5 * *'
  workflow_dispatch: # permite correr manualmente se necessário

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://qtynznppkxjmihxiquze.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "400" ]; then
            echo "Supabase está ativo"
          else
            echo "Resposta inesperada: $STATUS"
            exit 1
          fi
