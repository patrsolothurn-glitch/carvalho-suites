name: Supabase Keep-Alive

on:
  schedule:
    # Corre de 5 em 5 dias, às 06:00 UTC
    - cron: '0 6 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://qtynznppkxjmihxiquze.supabase.co/rest/v1/")
          echo "Supabase respondeu com: $STATUS"
          # Qualquer resposta (mesmo 401) significa que está activo
          if [ "$STATUS" != "000" ]; then
            echo "Supabase está activo"
          else
            echo "Sem resposta do Supabase"
            exit 1
          fi
