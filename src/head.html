  <script>

    (function () {
      var MAX_TOASTS = 3;

            cont.id = '__err_toasts';
            cont.style.cssText = 'position:fixed;bottom:80px;left:10px;right:10px;z-index:99999;display:flex;flex-direction:column;gap:8px;font-family:system-ui';
            document.body.appendChild(cont);
          }
          while (cont.children.length >= MAX_TOASTS) cont.removeChild(cont.firstChild);
          var msg = (err && (err.message || err.msg)) || String(err);
          var det = [];
          if (err && err.code) det.push('code: ' + err.code);
          if (err && err.details) det.push(err.details);
          if (err && err.hint) det.push('hint: ' + err.hint);
          var agora = new Date().toTimeString().slice(0, 8);
          var box = document.createElement('div');
          box.style.cssText = 'background:#7f1d1d;border:1px solid #ef4444;border-radius:14px;padding:12px 14px;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.5)';
          box.innerHTML =
            '<div style="font-weight:800;font-size:14px;margin-bottom:4px">\u26a0\ufe0f Erro \u2014 ' + origem + '</div>' +
            '<div style="font-size:13px;word-break:break-word">' + msg.replace(/</g, '&lt;') + '</div>' +
            (det.length ? '<div style="font-size:11px;opacity:.85;margin-top:4px;word-break:break-word">' + det.join(' \u00b7 ').replace(/</g, '&lt;') + '</div>' : '') +
            '<div style="font-size:10px;opacity:.6;margin-top:6px">' + agora + ' \u00b7 toca para fechar</div>';
          box.onclick = function () { box.remove(); };
          cont.appendChild(box);
          console.error('[' + origem + ']', err);
        } catch (e) { console.error(e); }
      };

      // Erros JS não tratados
      window.addEventListener('error', function (ev) {
        if (ev && ev.message) window.mostrarErro('JavaScript', { message: ev.message, details: (ev.filename || '') + ':' + (ev.lineno || '') });
      });
      window.addEventListener('unhandledrejection', function (ev) {
